name: Dependency Submission

# workflow limited to only files related to Gradle dependencies
on:
  push:
    branches:
      - "main"
      - "release-*"
    paths:
      - ".github/workflows/gradle-dependency-submission.yml"
      - "buildSrc/**"
      - "gradle/**"
      - "**/*.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"

jobs:
  dependency-submission:
    name: Dependency Submission
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      # Not using cache from setup-gradle for now due to license change.
      # See: https://blog.gradle.org/github-actions-for-gradle-v6
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: build-${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            build-${{ runner.os }}-gradle-

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v6
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.configuration-cache=false
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.workers.max=1
        with:
          cache-disabled: true
          dependency-graph-exclude-projects: ":buildSrc"
          dependency-graph-exclude-configurations: ".*[Tt]est(Compile|Runtime)Classpath"
